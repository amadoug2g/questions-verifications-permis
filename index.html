<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Permis B — Questions dans la voiture</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <style>
    /* ─── Reset & Variables ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f18;
      --surface:    #161926;
      --surface2:   #1e2235;
      --border:     #2a2f4a;
      --border2:    #353c5e;
      --text:       #e6e9f8;
      --text2:      #9ca3c8;
      --accent:     #6366f1;
      --accent-h:   #818cf8;
      --ok:         #22c55e;
      --ko:         #ef4444;
      --warn:       #f59e0b;
      --partial:    #a78bfa;
      --radius:     14px;
      --radius-sm:  8px;
      --odo-digit-bg: #111520;
      --sticky-bg:  rgba(13,15,24,.95);
      font-size: 16px;
    }

    :root.light {
      --bg:         #f8fafc;
      --surface:    #ffffff;
      --surface2:   #f1f5f9;
      --border:     #e2e8f0;
      --border2:    #cbd5e1;
      --text:       #1e293b;
      --text2:      #64748b;
      --accent:     #6366f1;
      --accent-h:   #4f46e5;
      --ok:         #16a34a;
      --ko:         #dc2626;
      --warn:       #d97706;
      --partial:    #7c3aed;
      --odo-digit-bg: #e2e8f0;
      --sticky-bg:  rgba(248,250,252,.95);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hidden { display: none !important; }

    /* ─── Photo hint ──────────────────────────────────────────────────── */
    .photo-hint {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: .82rem;
      color: var(--accent-h);
      background: rgba(99,102,241,.08);
      border: 1px solid rgba(99,102,241,.25);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      text-decoration: none;
      transition: background .15s;
    }
    .photo-hint:hover { background: rgba(99,102,241,.16); }

    /* ─── Video embed ──────────────────────────────────────────────────── */
    .q-video-wrap {
      margin-top: 12px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .q-video-iframe {
      width: 100%;
      max-width: 340px;
      height: 600px;
      border: none;
      display: block;
    }
    .q-video-link {
      font-size: .75rem;
      color: var(--text2);
      text-decoration: none;
      padding: 8px;
      opacity: .7;
      transition: opacity .15s;
    }
    .q-video-link:hover { opacity: 1; }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <h1>Permis B</h1>
      <span class="header-pill">Questions voiture</span>
    </div>
    <button id="theme-toggle" class="btn-history" title="Changer le thème" style="padding:7px 10px;font-size:1rem;line-height:1;">🌙</button>
  </header>

  <div id="screen-home" class="screen">
    <div class="home-hero">
      <h2>Questions dans la voiture</h2>
      <p>Démo vidéo — scénario 36 avec embed TikTok.</p>
    </div>
    <div id="wip-banner" class="wip-banner hidden">
      <span class="wip-text">Session en cours : <strong id="wip-label">–</strong></span>
      <div class="wip-actions">
        <button class="wip-btn wip-btn-resume" id="wip-resume">Reprendre</button>
        <button class="wip-btn wip-btn-dismiss" id="wip-dismiss">Ignorer</button>
      </div>
    </div>
    <div id="odo-container"></div>
    <button id="btn-history" class="btn-history hidden"><span>📋</span> Historique</button>
  </div>

  <div id="screen-history" class="screen hidden"></div>

  <div id="sticky-score-bar" class="sticky-score-bar">
    <span class="sticky-scenario-label">Scénario <strong id="sticky-scenario-num">–</strong></span>
    <div class="sticky-score-dots">
      <span class="sticky-dot" id="sticky-dot-0"></span>
      <span class="sticky-dot" id="sticky-dot-1"></span>
      <span class="sticky-dot" id="sticky-dot-2"></span>
    </div>
  </div>

  <div id="screen-quiz" class="screen hidden">
    <div class="quiz-topbar">
      <button class="back-btn" id="btn-back">← Accueil</button>
      <span class="quiz-scenario-tag">Scénario <strong id="scenario-num">–</strong><span id="scenario-status-badge" class="srs-badge hidden"></span></span>
    </div>
    <div id="score-container"></div>
    <div id="cards-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
