<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Permis B — Questions dans la voiture</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <style>
    /* ─── Reset & Variables ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f18;
      --surface:    #161926;
      --surface2:   #1e2235;
      --border:     #2a2f4a;
      --border2:    #353c5e;
      --text:       #e6e9f8;
      --text2:      #9ca3c8;
      --accent:     #6366f1;
      --accent-h:   #818cf8;
      --ok:         #22c55e;
      --ko:         #ef4444;
      --warn:       #f59e0b;
      --partial:    #a78bfa;
      --radius:     14px;
      --radius-sm:  8px;
      --odo-digit-bg: #111520;
      --sticky-bg:  rgba(13,15,24,.95);
      font-size: 16px;
    }

    :root.light {
      --bg:         #f8fafc;
      --surface:    #ffffff;
      --surface2:   #f1f5f9;
      --border:     #e2e8f0;
      --border2:    #cbd5e1;
      --text:       #1e293b;
      --text2:      #64748b;
      --accent:     #6366f1;
      --accent-h:   #4f46e5;
      --ok:         #16a34a;
      --ko:         #dc2626;
      --warn:       #d97706;
      --partial:    #7c3aed;
      --odo-digit-bg: #e2e8f0;
      --sticky-bg:  rgba(248,250,252,.95);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hidden { display: none !important; }


    /* ─── Header ─────────────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 0;
      transition: background .2s;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-brand h1 {
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text2);
    }

    .header-pill {
      font-size: .7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 99px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text2);
    }


    /* ─── Screen wrapper ────────────────────────────────────────── */
    .screen {
      width: 100%;
      max-width: 700px;
      padding: 28px 20px 64px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 20px;
    }


    /* ─── Home screen ───────────────────────────────────────────── */
    .home-hero {
      text-align: center;
      padding: 16px 0 8px;
    }
    .home-hero h2 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -.02em;
      margin-bottom: 10px;
    }
    .home-hero p {
      color: var(--text2);
      font-size: .92rem;
      line-height: 1.65;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ─── Odometer card ───────────────────────────────────────────── */
    .odo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .odo-label {
      font-size: .82rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 600;
    }

    .odo-display {
      display: flex;
      gap: 4px;
      align-items: center;
      font-size: 2.6rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: .04em;
    }

    .odo-digit {
      background: var(--odo-digit-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 52px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      transition: color .1s;
    }

    .odo-digit.active {
      background: #1a1428;
      border-color: var(--accent);
      color: var(--accent-h);
      box-shadow: 0 0 16px rgba(99,102,241,.25);
    }

    .odo-sep {
      color: var(--border2);
      font-size: 1.8rem;
      margin: 0 2px;
    }

    .odo-caption {
      font-size: .88rem;
      color: var(--text2);
    }
    .odo-caption strong {
      color: var(--text);
      font-weight: 700;
    }

    .odo-hint {
      font-size: .78rem;
      color: var(--text2);
      text-align: center;
      max-width: 360px;
      line-height: 1.5;
    }

    .odo-coverage {
      font-size: .75rem;
      color: var(--warn);
      text-align: center;
      max-width: 360px;
      line-height: 1.5;
      background: rgba(245,158,11,.08);
      border: 1px solid rgba(245,158,11,.2);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
    }


    /* ─── Sticky score bar ──────────────────────────────────────────── */
    .sticky-score-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: var(--sticky-bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .sticky-score-bar.visible { display: flex; }
    .sticky-scenario-label {
      font-size: .8rem;
      color: var(--text2);
      font-weight: 600;
    }
    .sticky-scenario-label strong {
      color: var(--accent-h);
    }
    .sticky-score-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .sticky-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border2);
      transition: background .2s;
    }
    .sticky-dot.dot-ok { background: var(--ok); }
    .sticky-dot.dot-ko { background: var(--ko); }

    /* ─── Quiz screen ──────────────────────────────────────────────────── */
    .quiz-topbar {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .back-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      font-size: .83rem;
      transition: color .15s, border-color .15s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--border2); }

    .quiz-scenario-tag {
      font-size: .82rem;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .quiz-scenario-tag strong {
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
    }

    /* ─── SRS status badges ──────────────────────────────────────────────── */
    .srs-badge, .odo-status-badge {
      font-size: .72rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 99px;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .srs-new      { background: rgba(99,102,241,.15);  color: var(--accent-h); border: 1px solid rgba(99,102,241,.3); }
    .srs-overdue  { background: rgba(245,158,11,.12);  color: var(--warn);     border: 1px solid rgba(245,158,11,.3); }
    .srs-upcoming { background: rgba(167,139,250,.12); color: var(--partial);  border: 1px solid rgba(167,139,250,.3); }
    .srs-mastered { background: rgba(34,197,94,.12);   color: var(--ok);       border: 1px solid rgba(34,197,94,.3); }

    .odo-caption-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ─── History button ────────────────────────────────────────────────── */
    .btn-history {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text2);
      cursor: pointer;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: .83rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color .15s, border-color .15s;
    }
    .btn-history:hover { color: var(--text); border-color: var(--text2); }

    /* ─── WIP banner ─────────────────────────────────────────────────────── */
    .wip-banner {
      background: rgba(99,102,241,.1);
      border: 1px solid rgba(99,102,241,.3);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .wip-text {
      font-size: .88rem;
      color: var(--text);
    }
    .wip-text strong { color: var(--accent-h); }
    .wip-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .wip-btn {
      cursor: pointer;
      border: none;
      border-radius: var(--radius-sm);
      font-size: .82rem;
      font-weight: 600;
      padding: 7px 14px;
    }
    .wip-btn-resume {
      background: var(--accent);
      color: #fff;
    }
    .wip-btn-resume:hover { opacity: .88; }
    .wip-btn-dismiss {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text2);
    }
    .wip-btn-dismiss:hover { color: var(--text); }

    /* ─── History panel ──────────────────────────────────────────────────── */
    .hp-topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 4px;
    }
    .hp-title {
      font-size: .9rem;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }
    .hp-clear-btn {
      background: none;
      border: 1px solid rgba(239,68,68,.35);
      color: var(--ko);
      cursor: pointer;
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-size: .78rem;
      font-weight: 600;
    }
    .hp-clear-btn:hover { background: rgba(239,68,68,.08); }

    .hp-analytics {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .hp-stat-row {
      display: flex;
      gap: 0;
      justify-content: space-around;
    }
    .hp-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .hp-stat-val {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .hp-stat-lbl {
      font-size: .72rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .hp-section-title {
      font-size: .75rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 700;
      margin-top: 4px;
    }
    .hp-qbars { display: flex; flex-direction: column; gap: 8px; }
    .hp-qbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hp-qbar-label {
      font-size: .78rem;
      color: var(--text2);
      font-weight: 600;
      width: 44px;
      flex-shrink: 0;
    }
    .hp-bar-track {
      flex: 1;
      height: 8px;
      background: var(--border2);
      border-radius: 99px;
      overflow: hidden;
    }
    .hp-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .4s ease;
    }
    .hp-qbar-pct {
      font-size: .78rem;
      font-weight: 700;
      width: 34px;
      text-align: right;
      flex-shrink: 0;
    }

    .hp-trend {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 36px;
    }
    .hp-trend-bar {
      flex: 1;
      border-radius: 3px 3px 0 0;
      min-height: 4px;
      cursor: default;
    }

    .hp-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hp-empty {
      text-align: center;
      color: var(--text2);
      font-size: .88rem;
      padding: 24px 0;
    }
    .hp-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .hp-entry-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .hp-entry-id {
      font-size: .88rem;
      font-weight: 700;
      color: var(--text);
    }
    .hp-entry-date {
      font-size: .72rem;
      color: var(--text2);
    }
    .hp-entry-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hp-entry-qs { display: flex; gap: 4px; }
    .hp-qicon {
      font-size: .8rem;
      font-weight: 700;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hp-qicon-ok { background: rgba(34,197,94,.15); color: var(--ok); }
    .hp-qicon-ko { background: rgba(239,68,68,.12); color: var(--ko); }
    .hp-entry-score {
      font-size: .95rem;
      font-weight: 800;
      min-width: 28px;
      text-align: right;
    }

    /* ─── ScoreBoard ────────────────────────────────────────────────────── */
    .scoreboard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .sb-dots {
      display: flex;
      gap: 12px;
      flex: 1;
    }

    .sb-dot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
      min-width: 44px;
    }

    .dot-ring {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .3s, background .3s;
    }

    .dot-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -62%);
      font-size: .9rem;
      font-weight: 700;
      color: var(--text2);
      transition: color .3s;
    }

    .dot-label {
      font-size: .68rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 600;
    }

    .sb-dot.dot-ok .dot-ring  { border-color: var(--ok); background: rgba(34,197,94,.12); }
    .sb-dot.dot-ok .dot-value { color: var(--ok); }
    .sb-dot.dot-ko .dot-ring  { border-color: var(--ko); background: rgba(239,68,68,.12); }
    .sb-dot.dot-ko .dot-value { color: var(--ko); }

    .sb-total {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      padding-left: 12px;
      border-left: 1px solid var(--border);
    }

    .sb-final {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .4s, transform .4s;
    }
    .sb-final.visible { opacity: 1; transform: translateY(0); }

    .final-top {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .final-score {
      font-size: 3.2rem;
      font-weight: 900;
      line-height: 1;
    }
    .final-denom {
      font-size: 1.6rem;
      color: var(--text2);
      font-weight: 500;
    }
    .final-emoji { font-size: 2.2rem; }
    .final-msg {
      font-size: 1rem;
      color: var(--text2);
      font-weight: 500;
    }
    .final-stats {
      font-size: .78rem;
      color: var(--text2);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .sb-actions {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .qbtn-next {
      background: var(--accent);
      color: #fff;
      flex: 1;
      justify-content: center;
      padding: 12px;
      font-size: .92rem;
      border-radius: 10px;
      margin-top: 4px;
    }
    .qbtn-next:hover { opacity: .88; }

    .qbtn-home {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text2);
      justify-content: center;
      padding: 12px 18px;
      font-size: .88rem;
      border-radius: 10px;
      margin-top: 4px;
    }
    .qbtn-home:hover { color: var(--text); border-color: var(--text2); }


    /* ─── Question Card ──────────────────────────────────────────────────────── */
    .qcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .3s, box-shadow .3s;
    }
    .qcard.card-ok { border-color: rgba(34,197,94,.5);  box-shadow: 0 0 0 1px rgba(34,197,94,.15); }
    .qcard.card-ko { border-color: rgba(239,68,68,.5);  box-shadow: 0 0 0 1px rgba(239,68,68,.15); }

    .qcard-header {
      background: var(--type-color, var(--accent));
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .qcard-type {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .type-badge {
      background: rgba(0,0,0,.25);
      color: #fff;
      font-size: .7rem;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: .08em;
    }

    .type-label {
      color: rgba(255,255,255,.92);
      font-size: .85rem;
      font-weight: 600;
    }

    .qcard-pts {
      font-size: .75rem;
      color: rgba(255,255,255,.7);
      font-weight: 600;
      background: rgba(0,0,0,.2);
      padding: 2px 8px;
      border-radius: 99px;
    }

    .qcard-body {
      padding: 22px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .photo-hint {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: .82rem;
      color: var(--accent-h);
      background: rgba(99,102,241,.08);
      border: 1px solid rgba(99,102,241,.25);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      text-decoration: none;
      transition: background .15s;
    }
    .photo-hint:hover { background: rgba(99,102,241,.16); }

    .q-text {
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.6;
      color: var(--text);
    }

    .q-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: .92rem;
      font-family: inherit;
      padding: 12px 14px;
      resize: none;
      outline: none;
      line-height: 1.55;
      min-height: 70px;
      transition: border-color .2s, box-shadow .2s;
    }
    .q-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
    .q-textarea.shake {
      animation: shake .4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    .q-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }


    /* ─── Buttons ────────────────────────────────────────────────────────── */
    .qbtn {
      cursor: pointer;
      border: none;
      border-radius: var(--radius-sm);
      font-size: .85rem;
      font-weight: 600;
      padding: 9px 16px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: opacity .15s, transform .1s, background .15s;
      white-space: nowrap;
    }
    .qbtn:active { transform: scale(.97); }
    .qbtn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .qbtn-ai {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
    }
    .qbtn-ai:not(:disabled):hover { opacity: .88; }

    .qbtn-reveal {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text2);
    }
    .qbtn-reveal:not(:disabled):hover { color: var(--text); border-color: var(--text2); }

    .qbtn-yes {
      background: rgba(34,197,94,.15);
      border: 1px solid rgba(34,197,94,.4);
      color: var(--ok);
      flex: 1;
    }
    .qbtn-yes:hover { background: rgba(34,197,94,.25); }

    .qbtn-no {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.35);
      color: var(--ko);
      flex: 1;
    }
    .qbtn-no:hover { background: rgba(239,68,68,.22); }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    .spinner-lg { width: 22px; height: 22px; border-width: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Feedback blocks ───────────────────────────────────────────────────── */
    .q-feedback {
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .feedback-ok      { background: rgba(34,197,94,.1);  border: 1px solid rgba(34,197,94,.3); }
    .feedback-partial { background: rgba(167,139,250,.1); border: 1px solid rgba(167,139,250,.3); }
    .feedback-ko      { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.3); }
    .feedback-reveal  { background: var(--surface2);     border: 1px solid var(--border2); }
    .feedback-error   { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); }

    .feedback-loading-wrap {
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .feedback-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text2);
      font-size: .88rem;
    }
    .feedback-loading .spinner { border-color: rgba(99,102,241,.3); border-top-color: var(--accent); }

    .fb-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .fb-icon {
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .feedback-ok .fb-icon    { color: var(--ok); }
    .feedback-partial .fb-icon { color: var(--partial); }
    .feedback-ko .fb-icon    { color: var(--ko); }

    .fb-label {
      font-size: .82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }
    .feedback-ok .fb-label    { color: var(--ok); }
    .feedback-partial .fb-label { color: var(--partial); }
    .feedback-ko .fb-label    { color: var(--ko); }

    .fb-comment {
      font-size: .9rem;
      color: var(--text);
      line-height: 1.6;
    }

    .fb-official {
      background: rgba(0,0,0,.2);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .fb-official-label {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 700;
      color: var(--text2);
      display: block;
      margin-bottom: 5px;
    }
    .fb-official p {
      font-size: .9rem;
      color: var(--text);
      line-height: 1.55;
    }

    .demo-badge {
      font-size: .65rem;
      background: rgba(245,158,11,.2);
      color: var(--warn);
      border: 1px solid rgba(245,158,11,.3);
      padding: 1px 6px;
      border-radius: 99px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
    }

    .score-badge {
      align-self: flex-end;
      font-size: .78rem;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 99px;
    }
    .score-ok { background: rgba(34,197,94,.2); color: var(--ok); border: 1px solid rgba(34,197,94,.3); }
    .score-ko { background: rgba(239,68,68,.15); color: var(--ko); border: 1px solid rgba(239,68,68,.25); }

    /* ─── Self-eval ───────────────────────────────────────────────────────── */
    .self-eval-prompt {
      font-size: .8rem;
      color: var(--text2);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .self-eval-btns {
      display: flex;
      gap: 10px;
    }

    /* ─── Explain block ─────────────────────────────────────────────────────── */
    .q-explain {
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .q-explain summary {
      cursor: pointer;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 7px;
      list-style: none;
      transition: color .15s;
    }
    .q-explain summary:hover { color: var(--text); }
    .q-explain summary::-webkit-details-marker { display: none; }
    .q-explain[open] summary { color: var(--text); margin-bottom: 10px; }
    .explain-body {
      font-size: .88rem;
      color: var(--text2);
      line-height: 1.7;
      padding-left: 4px;
    }

    /* ─── Bottom sheet (vidéo) ──────────────────────────────────────────── */
    body.sheet-open { overflow: hidden; touch-action: none; }

    .vsheet-backdrop {
      position: fixed; inset: 0; z-index: 90;
      background: rgba(0,0,0,.55);
      opacity: 0; pointer-events: none;
      transition: opacity .2s ease;
    }
    .vsheet-backdrop.open { opacity: 1; pointer-events: auto; }

    .vsheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 91;
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.32,.72,0,1);
      max-height: 90dvh;
      overflow: hidden;
    }
    .vsheet.open { transform: translateY(0); }

    .vsheet-grab {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: var(--border2);
      margin: 4px auto 12px;
    }

    .vsheet-frame { width: 100%; background: #000; border-radius: 12px; overflow: hidden; }
    .vsheet-frame.tiktok {
      aspect-ratio: 9 / 16;
      max-height: 78dvh;
      margin-inline: auto;
      max-width: calc(78dvh * 9 / 16);
      display: flex;
      flex-direction: column;
    }
    .vsheet-frame.youtube { aspect-ratio: 16 / 9; }
    .vsheet-frame iframe { width: 100%; height: 100%; border: 0; display: block; flex: 1; }

    .vsheet-link {
      font-size: .75rem;
      color: var(--text2);
      text-decoration: none;
      padding: 8px;
      opacity: .7;
      transition: opacity .15s;
      text-align: center;
      display: block;
      background: var(--surface);
    }
    .vsheet-link:hover { opacity: 1; }

    /* Bouton vidéo dans le récapitulatif final */
    .qbtn-video {
      background: rgba(99,102,241,.12);
      border: 1px solid rgba(99,102,241,.35);
      color: var(--accent-h);
      width: 100%;
      justify-content: center;
      padding: 11px;
      font-size: .9rem;
      border-radius: 10px;
    }
    .qbtn-video:hover { background: rgba(99,102,241,.22); }

    /* ─── Stepper nav (mobile question-by-question) ───────────────────── */
    .stepper-nav {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 0 8px;
    }
    .step-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 9px 18px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    .step-btn:disabled { opacity: .28; cursor: not-allowed; }
    .step-btn:not(:disabled):hover { background: var(--border2); }
    .step-counter {
      font-size: .85rem;
      color: var(--text2);
      font-weight: 500;
      white-space: nowrap;
    }
    .step-counter strong {
      color: var(--text);
      font-weight: 700;
    }

    /* ─── Responsive ───────────────────────────────────────────────────────── */
    @media (max-width: 767px) {
      .stepper-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 200;
        background: var(--sticky-bg);
        border-top: 1px solid var(--border);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 12px 20px;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }

      .step-btn {
        min-height: 44px;
        padding: 10px 20px;
        font-size: .9rem;
      }

      #screen-quiz {
        padding-bottom: calc(80px + env(safe-area-inset-bottom));
      }

      .qcard { display: none; }
      .qcard.step-active { display: block; }

      .q-actions {
        flex-direction: column;
      }
      .qbtn-ai, .qbtn-reveal {
        width: 100%;
        justify-content: center;
        min-height: 48px;
        font-size: .92rem;
      }

      .qbtn { min-height: 44px; padding: 11px 18px; }
      .qbtn-yes, .qbtn-no { min-height: 48px; padding: 12px 16px; font-size: .9rem; }

      .back-btn { min-height: 44px; padding: 10px 16px; font-size: .9rem; }

      .q-textarea { font-size: 16px; }

      body {
        padding-bottom: env(safe-area-inset-bottom);
      }
    }

    @media (max-width: 520px) {
      .odo-card    { padding: 18px 14px; gap: 14px; }
      .odo-display { font-size: 1.9rem; }
      .odo-digit   { width: 38px; height: 50px; }
      .screen      { padding: 16px 14px 48px; gap: 14px; }
      .qcard-body  { padding: 16px 14px 14px; gap: 12px; }
      .self-eval-btns { flex-direction: column; }
      .qbtn-yes, .qbtn-no { flex: none; width: 100%; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <h1>Permis B</h1>
      <span class="header-pill">Questions voiture</span>
    </div>
    <button id="theme-toggle" class="btn-history" title="Changer le thème" style="padding:7px 10px;font-size:1rem;line-height:1;">🌙</button>
  </header>

  <div id="screen-home" class="screen">

    <div class="home-hero">
      <h2>Questions dans la voiture</h2>
      <p>
        Simule l'épreuve pratique : l'examinateur tire un scénario via les
        deux derniers chiffres du compteur. Réponds aux 3 questions
        (1 point chacune) pour t'entraîner.
      </p>
    </div>

    <div id="wip-banner" class="wip-banner hidden">
      <span class="wip-text">Session en cours : <strong id="wip-label">–</strong></span>
      <div class="wip-actions">
        <button class="wip-btn wip-btn-resume" id="wip-resume">Reprendre</button>
        <button class="wip-btn wip-btn-dismiss" id="wip-dismiss">Ignorer</button>
      </div>
    </div>

    <div id="odo-container"></div>

    <button id="btn-history" class="btn-history hidden">
      <span>📋</span> Historique
    </button>

  </div>

  <div id="screen-history" class="screen hidden"></div>

  <div id="sticky-score-bar" class="sticky-score-bar">
    <span class="sticky-scenario-label">Scénario <strong id="sticky-scenario-num">–</strong></span>
    <div class="sticky-score-dots">
      <span class="sticky-dot" id="sticky-dot-0"></span>
      <span class="sticky-dot" id="sticky-dot-1"></span>
      <span class="sticky-dot" id="sticky-dot-2"></span>
    </div>
  </div>

  <div id="screen-quiz" class="screen hidden">

    <div class="quiz-topbar">
      <button class="back-btn" id="btn-back">← Accueil</button>
      <span class="quiz-scenario-tag">Scénario <strong id="scenario-num">–</strong><span id="scenario-status-badge" class="srs-badge hidden"></span></span>
    </div>

    <div id="score-container"></div>

    <div id="cards-container"></div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
