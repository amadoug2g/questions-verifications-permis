name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  # ── Étape 1 : tests (fail fast) ─────────────────────────────────
  test:
    name: Tests (Vitest — 5 couches TDD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests
        run: npm test
      - name: Coverage report
        run: npm run test:coverage
        continue-on-error: true

  # ── Étape 2 : build (seulement si tests OK) ──────────────────────
  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
